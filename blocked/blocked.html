<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Site blocked</title>
    <link rel="stylesheet" href="blocked.css">
  </head>
  <body>
    <main class="blocked" aria-labelledby="title">
      <div class="labelCallout" aria-hidden="true">
        <span>This is Jose</span>
      </div>

      <div class="speech" aria-hidden="true">No Way</div>

      <section class="notice">
        <p class="eyebrow">Local Site Blocker</p>
        <h1 id="title">This site is blocked</h1>
        <p id="site" class="site"></p>
        <p class="hint">Open the extension to unblock this website.</p>
      </section>
    </main>
    <script type="module" src="blocked.js"></script>
  </body>
</html>
