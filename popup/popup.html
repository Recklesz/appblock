<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Local Site Blocker</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <p class="eyebrow">Local Site Blocker</p>
        <h1>Current website</h1>
      </header>

      <section class="current">
        <div>
          <p class="label">Current site</p>
          <p id="currentSite" class="site">No website tab detected</p>
        </div>
        <button id="currentAction" class="primary" type="button" disabled>Block</button>
      </section>

      <details id="morePanel" class="more">
        <summary>More</summary>
        <div class="moreBody">
          <form id="addForm" class="form">
            <label for="siteInput">Add website</label>
            <div class="inputRow">
              <input id="siteInput" type="text" autocomplete="off" placeholder="youtube.com">
              <button type="submit" title="Add site">+</button>
            </div>
          </form>

          <section class="bulk" aria-label="Bulk blocked sites">
            <label for="bulkInput">Bulk edit</label>
            <textarea id="bulkInput" spellcheck="false" placeholder="youtube.com&#10;instagram.com"></textarea>
            <div class="bulkActions">
              <button id="saveBulkButton" type="button">Save list</button>
              <button id="exportButton" type="button">Copy list</button>
              <button id="clearButton" type="button">Clear all</button>
            </div>
          </section>

          <section class="listPanel">
            <div class="listHeader">
              <p>Blocked sites</p>
              <span id="count">0</span>
            </div>
            <ul id="siteList" class="siteList"></ul>
          </section>
        </div>
      </details>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
